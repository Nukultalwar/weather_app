<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App - Clean & Modern</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>🌤️ Weather</h1>
            <p class="subtitle">Check weather anywhere</p>
        </header>

        <div class="search-section">
            <div class="input-group">
                <input type="text" id="cityInput" placeholder="Enter city name (e.g., London)" autocomplete="off">
                <button id="searchBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                        <path d="M21 21L15 15M17 10C17 6.7 14.3 4 11 4S5 6.7 5 10s4.69 6 7.999 6A9.002 9.002 0 0 0 17 10z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                    Search
                </button>
            </div>
        </div>

        <!-- Loading Spinner -->
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Fetching weather...</p>
        </div>

        <!-- Error Message -->
        <div id="error" class="error hidden">
            <p id="errorMsg">City not found. Please try another city.</p>
        </div>

        <!-- Weather Card -->
        <div id="weatherCard" class="weather-card hidden">
            <div class="top-section">
                <div class="city-time">
                    <h2 id="cityName" class="city">London</h2>
                    <p id="currentTime" class="time">--:-- --</p>
                </div>
                <div class="weather-icon" id="weatherIcon">🌤️</div>
            </div>
            
            <div class="temp-section">
                <p class="temperature" id="temperature">20°C</p>
                <p class="condition" id="condition">Clear Sky</p>
            </div>

<div class="details-grid">
                <div class="detail-item">
                    <span class="detail-label">Humidity</span>
                    <span id="humidity" class="detail-value">67%</span>
                </div>
                <div class="detail-item">
                    <span class="detail-label">Wind</span>
                    <span id="windSpeed" class="detail-value">3.2 km/h</span>
                </div>
            </div>

            <!-- Thermal Heat Map -->
            <div class="thermal-section" id="thermalSection" style="display: none;">
                <h3>Temperature Heat Map</h3>
                <div class="thermal-graphic">
                    <svg width="200" height="200" viewBox="0 0 200 200">
                        <defs>
                            <radialGradient id="tempGradient" cx="50%" cy="50%">
                                <stop offset="0%" id="centerTemp"/>
                                <stop offset="70%" id="midTemp"/>
                                <stop offset="100%" id="edgeTemp"/>
                            </radialGradient>
                        </defs>
                        <circle cx="100" cy="100" r="90" fill="url(#tempGradient)" stroke="rgba(255,255,255,0.3)" stroke-width="5"/>
                        <text x="100" y="105" text-anchor="middle" font-size="28" font-weight="700" id="thermalTemp" fill="#333">25°C</text>
                    </svg>
                </div>
                <p class="thermal-range" id="thermalRange">Country avg: 22-28°C <span class="country-side">Sides: 20°C</span></p>
            </div>
        </div>

        <footer>
            <p>Made with ☕ | Powered by OpenWeatherMap</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
